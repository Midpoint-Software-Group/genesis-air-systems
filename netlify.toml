[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL = "https://gpkvnzjueqruucydtloc.supabase.co"
  VITE_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdwa3Zuemp1ZXFydXVjeWR0bG9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjI1MjUsImV4cCI6MjA5NDAzODUyNX0.X5JOHMyfyhRQxFSeLCNAiG7HWoZaM4yR19-EA_XYTLE"

# SPA fallback — all routes go to index.html so React Router can handle them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer info
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Enforce HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Permissions: allow geolocation only for same-origin (GPS tracking for techs)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), payment=(self)"
    # CSP: restrict resource loading
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://tile.openstreetmap.org https://nominatim.openstreetmap.org https://api.twilio.com; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
